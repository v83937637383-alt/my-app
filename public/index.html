<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#12141C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141C;
    --panel:#1A1D29;
    --border:#2A2E3D;
    --text:#EDEEF3;
    --muted:#8A8FA6;
    --amber:#FFA23D;
    --teal:#33D6B0;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg); color:var(--text); margin:0;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:32px 24px;
    -webkit-font-smoothing:antialiased;
  }
  .mark{
    width:52px; height:52px; border-radius:16px; margin-bottom:18px;
    background:radial-gradient(circle at 35% 35%, var(--amber), #C9701A 70%);
    position:relative;
  }
  .mark::after{
    content:""; position:absolute; inset:15px; border-radius:50%;
    background:var(--bg); opacity:.85;
  }
  h1{font-family:'Sora',sans-serif; font-size:22px; font-weight:600; margin:0 0 8px; letter-spacing:-0.01em;}
  p{color:var(--muted); font-size:14px; max-width:300px; line-height:1.55; margin:0 0 26px;}
  button{
    background:var(--amber); color:#1A1200; border:none;
    padding:13px 24px; border-radius:10px; font-weight:600; font-size:14px;
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  button:disabled{opacity:.5;}
  #status{
    margin-top:18px; font-size:12px; color:var(--teal);
    font-family:'IBM Plex Mono',monospace; min-height:16px;
  }
</style>
</head>
<body>
  <div class="mark"></div>
  <h1>Shopify</h1>
  <p>Add this to your home screen, then turn on notifications to start receiving updates.</p>
  <button id="subscribeBtn">Turn on notifications</button>
  <div id="status"></div>

<script>
  // Your real VAPID public key — already set, no need to change this.
  const VAPID_PUBLIC_KEY = "BFHiX41xZsoQM2vHrXDMxlmZgNll-SBG372Ttok7EduT-86RSrJtmus8RI0VyA-UZPw9WvOV0frJOKRDKRGXzSU";

  const statusEl = document.getElementById('status');
  const btn = document.getElementById('subscribeBtn');

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  async function subscribe() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      statusEl.textContent = "Push isn't supported in this browser.";
      return;
    }

    const reg = await navigator.serviceWorker.register('/service-worker.js');
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      statusEl.textContent = 'Notification permission was not granted.';
      return;
    }

    const subscription = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    await fetch('/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(subscription)
    });

    statusEl.textContent = 'Subscribed — notifications are on.';
    btn.disabled = true;
    btn.textContent = 'Notifications on';
  }

  btn.addEventListener('click', subscribe);
</script>
</body>
</html>
