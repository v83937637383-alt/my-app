<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3D5AFE">
<style>
  body{
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    background:#F5F6FA; color:#161A2C; margin:0; padding:32px 20px;
    display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  h1{font-size:20px; margin-bottom:6px;}
  p{color:#6B7080; font-size:14px; max-width:320px; line-height:1.5;}
  button{
    margin-top:20px; background:#3D5AFE; color:#fff; border:none;
    padding:12px 22px; border-radius:8px; font-weight:600; font-size:14px;
    cursor:pointer;
  }
  button:disabled{opacity:.5;}
  #status{margin-top:16px; font-size:12.5px; color:#6B7080; font-family:monospace;}
</style>
</head>
<body>
  <h1>Shopify</h1>
  <p>Install this to your home screen, then turn on notifications. You'll get one at random every 5 minutes from the server.</p>
  <button id="subscribeBtn">Turn on notifications</button>
  <div id="status"></div>

<script>
  // Replace with the VAPID public key printed by the server on first run.
  const VAPID_PUBLIC_KEY = "BFHiX41xZsoQM2vHrXDMxlmZgNll-SBG372Ttok7EduT-86RSrJtmus8RI0VyA-UZPw9WvOV0frJOKRDKRGXzSU";

  const statusEl = document.getElementById('status');
  const btn = document.getElementById('subscribeBtn');

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  async function subscribe() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      statusEl.textContent = 'Push isn\'t supported in this browser.';
      return;
    }

    const reg = await navigator.serviceWorker.register('/service-worker.js');
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      statusEl.textContent = 'Notification permission was not granted.';
      return;
    }

    const subscription = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    await fetch('/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(subscription)
    });

    statusEl.textContent = 'Subscribed. You will get a random notification every 5 minutes.';
    btn.disabled = true;
    btn.textContent = 'Notifications on';
  }

  btn.addEventListener('click', subscribe);
</script>
</body>
</html>
